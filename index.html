<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 到貨點收與店家分類系統</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --orange: #fbbc04; --red: #ea4335; --purple: #a142f4; --dark: #202124; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; color: #3c4043; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 600px; margin: auto; flex: 1; width: 100%; padding-bottom: 100px; }
        
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 22px; color: var(--blue); margin: 0; }

        .search-card { position: sticky; top: 10px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }

        /* 品項列表樣式 */
        .item-row { display: flex; align-items: flex-start; padding: 15px; border-bottom: 1px solid #f1f3f4; background: white; cursor: pointer; transition: 0.2s; }
        .item-row:active { background: #f8f9fa; }
        .checkbox-area { padding-right: 15px; padding-top: 5px; }
        .checkbox-area input { width: 22px; height: 22px; cursor: pointer; }
        
        .info-area { flex: 1; }
        .item-title { font-size: 18px; font-weight: 800; color: #1a202c; display: block; margin-bottom: 8px; }
        .shop-tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .shop-tag { background: #edf2f7; padding: 4px 8px; border-radius: 6px; font-size: 14px; color: #4a5568; border: 1px solid #e2e8f0; }
        .shop-tag b { color: var(--red); font-size: 16px; margin-left: 3px; }

        /* 店家分類區 (下方浮動或固定區) */
        .dispatch-section { margin-top: 30px; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .dispatch-header { font-size: 18px; font-weight: 800; color: var(--purple); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        
        .shop-group-box { background: #f8fafc; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px dashed #cbd5e0; }
        .shop-group-title { font-size: 16px; font-weight: 800; color: #2d3748; margin-bottom: 8px; border-left: 4px solid var(--blue); padding-left: 10px; }
        .dispatch-item { font-size: 15px; padding: 4px 0; color: #4a5568; display: flex; justify-content: space-between; align-items: center; }
        .dispatch-item:hover { color: var(--red); cursor: pointer; text-decoration: line-through; }

        .warning-footer { text-align: center; padding: 25px 15px; color: #888; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🚚 到貨分貨助手</h1></div>

    <div class="search-card">
        <input type="text" id="searchInput" placeholder="🔍 搜尋到貨品項 (如：洋芋片)..." oninput="debounceSearch()">
    </div>

    <div id="searchResults" style="margin-top: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);"></div>

    <div id="dispatchSection" class="dispatch-section" style="display: none;">
        <div class="dispatch-header">📋 各店家待分配清單 (點擊可取消)</div>
        <div id="shopGroupsContainer"></div>
    </div>

    <div class="warning-footer">
        系統偶有出錯可能，若有問題請詢問小編。
    </div>
</div>

<script>
    const SHEET_ID = '2PACX-1vSKJ-bbty6XrC42lhDt4IZkx30Xd5suv7asS7ujAncXMnv_AnHBRNuXbxU_HeH3sNxduS22z8I_rqF0'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&gid=0`;
    
    // 欄位定義
    const SHOP_MAP = { "中港": 3, "小賴2(原小米妮)": 4, "北冰": 5, "小賴": 6, "安星": 7, "辣媽": 8 };
    
    let allData = [];
    let selectedItems = new Set(); // 存儲已勾選的品項名稱

    let timer = null;
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(fetchData, 300); }

    async function fetchData() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsArea = document.getElementById('searchResults');
        if (!query) { resultsArea.innerHTML = ""; return; }

        try {
            const resp = await fetch(`${SHEET_URL}&cache=${Date.now()}`);
            const csv = await resp.text();
            allData = csv.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            
            const filtered = allData.filter(r => r[0] && r[0].replace(/"/g, '').includes(query));
            renderSearchResults(filtered);
        } catch (e) { console.error(e); }
    }

    function renderSearchResults(matches) {
        const resultsArea = document.getElementById('searchResults');
        resultsArea.innerHTML = "";

        matches.forEach((row, index) => {
            const name = row[0].replace(/"/g, '');
            const isChecked = selectedItems.has(name) ? "checked" : "";
            
            let shopDetails = [];
            for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                let v = parseInt(row[sIdx]) || 0;
                if (v !== 0) shopDetails.push(`<span class="shop-tag">${sName}<b>${v}</b></span>`);
            }

            const html = `
                <div class="item-row" onclick="toggleSelection('${name}')">
                    <div class="checkbox-area">
                        <input type="checkbox" id="chk-${index}" ${isChecked} onclick="event.stopPropagation(); toggleSelection('${name}')">
                    </div>
                    <div class="info-area">
                        <span class="item-title">${name}</span>
                        <div class="shop-tag-container">${shopDetails.join('')}</div>
                    </div>
                </div>
            `;
            resultsArea.innerHTML += html;
        });
    }

    function toggleSelection(itemName) {
        if (selectedItems.has(itemName)) {
            selectedItems.delete(itemName);
        } else {
            selectedItems.add(itemName);
        }
        updateDispatchList();
        // 重新渲染搜尋結果以同步勾選狀態
        const query = document.getElementById('searchInput').value.trim();
        if (query) fetchData();
    }

    function updateDispatchList() {
        const container = document.getElementById('shopGroupsContainer');
        const section = document.getElementById('dispatchSection');
        
        if (selectedItems.size === 0) {
            section.style.display = "none";
            return;
        }

        section.style.display = "block";
        container.innerHTML = "";

        // 建立各家店的清單物件
        let shopGroups = {};
        for (const sName of Object.keys(SHOP_MAP)) shopGroups[sName] = [];

        // 遍歷所有選取的品項，找出各店數量
        allData.forEach(row => {
            const name = row[0].replace(/"/g, '');
            if (selectedItems.has(name)) {
                for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                    let v = parseInt(row[sIdx]) || 0;
                    if (v !== 0) {
                        shopGroups[sName].push({ name, qty: v });
                    }
                }
            }
        });

        // 渲染畫面
        for (const [sName, items] of Object.entries(shopGroups)) {
            if (items.length > 0) {
                let itemsHtml = items.map(it => `
                    <div class="dispatch-item" onclick="toggleSelection('${it.name}')">
                        <span>${it.name}</span>
                        <b>${it.qty}</b>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="shop-group-box">
                        <div class="shop-group-title">📍 安星給${sName}</div>
                        ${itemsHtml}
                    </div>
                `;
            }
        }
    }
</script>
</body>
</html>
