<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 出貨快速查詢與手動看板</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --orange: #fbbc04; --red: #ea4335; --purple: #a142f4; --dark: #202124; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; color: #3c4043; min-height: 100vh; }
        .container { max-width: 600px; margin: auto; width: 100%; }
        
        .header { text-align: center; padding: 15px 0; }
        .header h1 { font-size: 22px; color: var(--blue); margin: 0; }

        .sticky-box { position: sticky; top: 10px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .search-card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #e0e6ed; }
        input, select { width: 100%; padding: 12px; border: none; background: #f1f3f4; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }

        /* 手動新增區 */
        .manual-add-box { background: #fff; border-radius: 15px; padding: 15px; border: 2px dashed var(--green); display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .manual-add-box input { flex: 2; min-width: 120px; }
        .manual-add-box select { flex: 1; min-width: 80px; }
        .add-btn { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 待取貨清單看板 */
        .dispatch-section { margin: 20px 0; background: white; border-radius: 20px; padding: 20px; border: 3px solid var(--purple); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dispatch-header { font-size: 18px; font-weight: 900; color: var(--purple); margin-bottom: 15px; display: flex; justify-content: space-between; }
        .shop-box { background: #f8fafc; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .shop-box-title { font-weight: 800; color: #2d3748; margin-bottom: 8px; border-bottom: 2px solid #cbd5e0; padding-bottom: 5px; font-size: 18px; }
        .dispatch-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ccc; cursor: pointer; }
        .dispatch-row:active { background: #fee2e2; }
        .dispatch-row b { color: var(--red); font-size: 24px; }

        /* 查詢結果樣式 */
        .group-card { background: white; margin-top: 20px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-left: 12px solid; }
        .c-0 { border-color: var(--blue); } .c-1 { border-color: var(--green); } .c-2 { border-color: var(--orange); } .c-none { border-color: #bdc1c6; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 20px; border-bottom: 1px solid #f1f3f4; vertical-align: top; cursor: pointer; }
        .item-title { font-size: 19px; font-weight: 800; color: #1a202c; display: block; margin-bottom: 8px; }
        .shop-tag { background: #edf2f7; padding: 8px 12px; border-radius: 10px; font-size: 16px; margin-right: 5px; display: inline-block; margin-top: 5px; }
        .shop-tag b { color: var(--red); font-size: 22px; margin-left: 4px; }
        .qty-cell { text-align: right; font-weight: 900; font-size: 34px; color: var(--blue); width: 80px; padding-top: 25px !important; }

        .warning-footer { text-align: center; padding: 30px; color: #888; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🚚 到貨分貨工作看板</h1></div>

    <div class="sticky-box">
        <div class="search-card">
            <input type="text" id="searchInput" placeholder="🔍 搜尋到貨品項點擊加入清單..." oninput="debounceSearch()">
        </div>
        
        <div class="manual-add-box">
            <input type="text" id="manualName" placeholder="臨時品項名稱">
            <select id="manualShop">
                <option value="中港">中港</option>
                <option value="小賴2(原小米妮)">小賴2</option>
                <option value="北冰">北冰</option>
                <option value="小賴">小賴</option>
                <option value="安星">安星</option>
                <option value="新廠商">新廠商</option>
            </select>
            <input type="number" id="manualQty" placeholder="量" style="flex:0.5; min-width:50px;">
            <button class="add-btn" onclick="addManualItem()">➕ 新增</button>
        </div>
    </div>

    <div id="dispatchArea" class="dispatch-section" style="display:none;">
        <div class="dispatch-header">
            <span>📋 各店待取清單 (點擊單項取消)</span>
            <button onclick="clearBoard()" style="font-size:12px; background:none; border:1px solid #ccc; border-radius:5px; cursor:pointer;">全部清空</button>
        </div>
        <div id="shopContent"></div>
    </div>

    <div id="displayArea"></div>

    <div class="warning-footer">⚠️ 系統數據僅供參考，實際以現場拆箱為準。</div>
</div>

<script>
    const SHEET_ID = '2PACX-1vSKJ-bbty6XrC42lhDt4IZkx30Xd5suv7asS7ujAncXMnv_AnHBRNuXbxU_HeH3sNxduS22z8I_rqF0'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&gid=0`;
    const SHOP_MAP = { "中港": 3, "小賴2(原小米妮)": 4, "北冰": 5, "小賴": 6, "安星": 7, "新廠商": 8 };

    // 儲存格式: { "中港": [ {name: "洋芋片", qty: 5, source: "sheet/manual"}, ... ] }
    let boardData = {};
    for (let s in SHOP_MAP) boardData[s] = [];

    let lastFetchedData = [];
    let timer = null;

    function debounceSearch() { clearTimeout(timer); timer = setTimeout(fetchData, 300); }

    async function fetchData() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) { document.getElementById('displayArea').innerHTML = ""; return; }
        try {
            const resp = await fetch(`${SHEET_URL}&cache=${Date.now()}`);
            const csv = await resp.text();
            lastFetchedData = csv.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const filtered = lastFetchedData.filter(r => r[0] && r[0].replace(/"/g, '').includes(query));
            renderSearch(filtered);
        } catch (e) { console.error(e); }
    }

    // 渲染搜尋結果 (維持原有的分組邏輯)
    function renderSearch(matches) {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const finalGroups = {};

        matches.forEach(row => {
            const name = row[0].replace(/"/g, '');
            const ruleStr = (row[12] || "").replace(/"/g, '').trim(); 
            const note = (row[13] || "").replace(/"/g, '').trim();
            const rules = ruleStr === "" ? ["全部"] : ruleStr.split('/').map(r => r.trim());
            
            rules.forEach((rName, idx) => {
                let sub = 0, detailHtml = [];
                const isAll = rName === "全部";
                for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                    if (isAll || rName.split('+').some(t => sName.includes(t.trim()))) {
                        let v = parseInt(row[sIdx]) || 0;
                        if (v !== 0) { 
                            detailHtml.push(`<div class="shop-tag">🏠 ${sName}<b>${v}</b></div>`); 
                            sub += v;
                        }
                    }
                }
                if (sub !== 0) {
                    if (!finalGroups[rName]) finalGroups[rName] = { idx, items: [] };
                    finalGroups[rName].items.push({ name, sub, detail: detailHtml.join(''), note, rawRow: row, rName });
                }
            });
        });

        for (const [gName, data] of Object.entries(finalGroups)) {
            const colorClass = (gName === "其他" || gName === "全部") ? "c-none" : `c-${data.idx % 3}`;
            let html = `<div class="group-card ${colorClass}"><div style="padding:10px 20px; background:#f8f9fa; font-weight:bold;">📍 ${gName} 分組</div><table>`;
            data.items.forEach(item => {
                html += `<tr onclick="addToBoardFromSheet('${item.name}', '${item.rName}')">
                    <td><span class="item-title">🔹 ${item.name}</span>${item.detail}</td>
                    <td class="qty-cell">${item.sub}</td>
                </tr>`;
            });
            area.innerHTML += html + "</table></div>";
        }
    }

    // 從搜尋結果加入看板 (依據分組規則拆分到各店)
    function addToBoardFromSheet(name, groupName) {
        const row = lastFetchedData.find(r => r[0].replace(/"/g, '') === name);
        if (!row) return;

        const isAll = groupName === "全部";
        for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
            if (isAll || groupName.split('+').some(t => sName.includes(t.trim()))) {
                let v = parseInt(row[sIdx]) || 0;
                if (v !== 0) {
                    // 避免重複加入
                    if (!boardData[sName].some(i => i.name === name)) {
                        boardData[sName].push({ name, qty: v });
                    }
                }
            }
        }
        updateBoardUI();
    }

    // 手動新增臨時品項
    function addManualItem() {
        const name = document.getElementById('manualName').value.trim();
        const shop = document.getElementById('manualShop').value;
        const qty = parseInt(document.getElementById('manualQty').value);

        if (!name || isNaN(qty)) { alert("請輸入完整品項名稱與數量"); return; }
        
        boardData[shop].push({ name: `✨ ${name}`, qty: qty });
        updateBoardUI();
        
        // 清空輸入框
        document.getElementById('manualName').value = "";
        document.getElementById('manualQty').value = "";
    }

    // 單項取消 (各店獨立)
    function removeItem(shop, name) {
        boardData[shop] = boardData[shop].filter(i => i.name !== name);
        updateBoardUI();
    }

    function clearBoard() { if(confirm("確定要清空整個看板嗎？")) { for(let s in boardData) boardData[s] = []; updateBoardUI(); } }

    // 更新看板畫面
    function updateBoardUI() {
        const area = document.getElementById('dispatchArea');
        const content = document.getElementById('shopContent');
        let hasAny = false;
        content.innerHTML = "";

        for (const [shop, items] of Object.entries(boardData)) {
            if (items.length > 0) {
                hasAny = true;
                let rows = items.map(i => `
                    <div class="dispatch-row" onclick="removeItem('${shop}', '${i.name}')">
                        <span>${i.name}</span>
                        <b>${i.qty}</b>
                    </div>
                `).join('');
                content.innerHTML += `<div class="shop-box"><div class="shop-box-title">📍 安星給${shop}</div>${rows}</div>`;
            }
        }
        area.style.display = hasAny ? "block" : "none";
    }
</script>
</body>
</html>
