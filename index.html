<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 出貨小助手 - 精確分貨版</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --orange: #fbbc04; --red: #ea4335; --purple: #a142f4; --dark: #202124; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; color: #3c4043; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 600px; margin: auto; flex: 1; width: 100%; }
        
        .header { text-align: center; padding: 20px 0 10px 0; }
        .header h1 { font-size: 24px; color: var(--blue); margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .search-card { position: sticky; top: 10px; background: white; padding: 18px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); z-index: 100; border: 2px solid #e0e6ed; }
        input { width: 100%; padding: 14px 20px; border: none; background: #f8f9fa; border-radius: 15px; font-size: 17px; box-sizing: border-box; outline: none; }

        .group-card { background: white; margin-top: 20px; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-left: 12px solid; }
        .selected-row { background: #e6fffa !important; opacity: 0.6; }

        .c-0 { border-color: var(--blue); }
        .c-1 { border-color: var(--green); }
        .c-2 { border-color: var(--orange); }
        .c-none { border-color: #bdc1c6; }

        .group-header { padding: 15px 20px; font-weight: 800; background: #fafbfc; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #edf2f7; }
        .total-badge { background: var(--red); color: white; padding: 5px 15px; border-radius: 25px; font-size: 16px; font-weight: 900; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 20px; border-bottom: 1px solid #f1f3f4; vertical-align: top; cursor: pointer; }
        
        .item-title { font-size: 20px; font-weight: 800; color: #1a202c; display: block; margin-bottom: 12px; }
        .shop-list-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .shop-item { background: #edf2f7; padding: 10px 14px; border-radius: 12px; font-size: 17px; color: #2d3748; border: 1px solid #e2e8f0; }
        .shop-item b { font-size: 26px; color: var(--red); margin-left: 5px; }

        .qty-cell { text-align: right; font-weight: 900; font-size: 36px; color: var(--blue); width: 85px; padding-top: 25px !important; }

        /* 下方清單強化 */
        .dispatch-section { margin-top: 40px; background: white; border-radius: 20px; padding: 20px; border: 3px solid var(--purple); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dispatch-header { font-size: 18px; font-weight: 900; color: var(--purple); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .shop-box { background: #f8fafc; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .shop-box-title { font-weight: 800; color: #2d3748; margin-bottom: 10px; border-bottom: 2px solid #cbd5e0; padding-bottom: 5px; font-size: 18px; }
        
        .dispatch-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; font-size: 17px; border-bottom: 1px dashed #ccc; cursor: pointer; color: #4a5568; }
        .dispatch-row:active { background: #fee2e2; }
        .dispatch-row span { flex: 1; padding-right: 10px; }
        .dispatch-row b { color: var(--red); font-size: 24px; min-width: 40px; text-align: right; }

        .warning-footer { text-align: center; padding: 25px 15px; color: #888; font-size: 13px; border-top: 1px solid #e2e8f0; margin-top: 40px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📦 出貨快速查詢</h1></div>
    <div class="search-card">
        <input type="text" id="searchInput" placeholder="🔍 搜尋並點選分組到貨..." oninput="debounceSearch()">
    </div>
    <div id="displayArea"></div>

    <div id="dispatchArea" class="dispatch-section" style="display:none;">
        <div class="dispatch-header">📋 安星給各店待取清單 (點擊單項取消)</div>
        <div id="shopContent"></div>
    </div>

    <div class="warning-footer">⚠️ 溫馨提示：系統偶有出錯可能，若有問題請詢問小編。</div>
</div>

<script>
    const SHEET_ID = '2PACX-1vSKJ-bbty6XrC42lhDt4IZkx30Xd5suv7asS7ujAncXMnv_AnHBRNuXbxU_HeH3sNxduS22z8I_rqF0'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&gid=0`;
    const SHOP_MAP = { "中港": 3, "小賴2(原小米妮)": 4, "北冰": 5, "小賴": 6, "安星": 7, "新廠商": 8 };

    // 核心資料結構：紀錄哪些 "品項|分組|店家" 被取消了
    let hiddenDispatchKeys = new Set(); 
    let selectedKeys = new Set(); // 品項|分組
    let lastFetchedData = [];

    let timer = null;
    function debounceSearch() { clearTimeout(timer); timer = setTimeout(fetchData, 300); }

    async function fetchData() {
        const query = document.getElementById('searchInput').value.trim();
        const area = document.getElementById('displayArea');
        if (!query) { area.innerHTML = ""; return; }
        try {
            const resp = await fetch(`${SHEET_URL}&cache=${Date.now()}`);
            const csv = await resp.text();
            lastFetchedData = csv.split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const filtered = lastFetchedData.filter(r => r[0] && r[0].replace(/"/g, '').includes(query));
            renderGroups(filtered);
        } catch (e) { console.error(e); }
    }

    function renderGroups(matches) {
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        const finalGroups = {};

        matches.forEach(row => {
            const name = row[0].replace(/"/g, '');
            const ruleStr = (row[12] || "").replace(/"/g, '').trim(); 
            const note = (row[13] || "").replace(/"/g, '').trim();
            const rules = ruleStr === "" ? ["全部"] : ruleStr.split('/').map(r => r.trim());
            
            rules.forEach((rName, idx) => {
                let sub = 0, detailHtmlArr = [];
                const isAll = rName === "全部";
                for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                    if (isAll || rName.split('+').some(t => sName.includes(t.trim()))) {
                        // 檢查這家店是否被單獨取消了
                        if (!hiddenDispatchKeys.has(`${name}|${rName}|${sName}`)) {
                            let v = parseInt(row[sIdx]) || 0;
                            if (v !== 0) { 
                                detailHtmlArr.push(`<div class="shop-item">🏠 ${sName}<b>${v}</b></div>`); 
                                sub += v;
                            }
                        }
                    }
                }
                if (detailHtmlArr.length > 0) {
                    if (!finalGroups[rName]) finalGroups[rName] = { idx, items: [] };
                    finalGroups[rName].items.push({ name, sub, detail: detailHtmlArr.join(' '), note });
                }
            });
        });

        for (const [gName, data] of Object.entries(finalGroups)) {
            const colorClass = (gName === "其他" || gName === "全部") ? "c-none" : `c-${data.idx % 3}`;
            let html = `<div class="group-card ${colorClass}"><div class="group-header"><span>📍 ${gName} 分組</span></div><table>`;
            data.items.forEach(item => {
                const uniqueKey = `${item.name}|${gName}`;
                const isSel = selectedKeys.has(uniqueKey) ? "selected-row" : "";
                html += `
                    <tr class="${isSel}" onclick="toggleGroupItem('${item.name}', '${gName}')">
                        <td>
                            <span class="item-title">🔹 ${item.name}</span>
                            <div class="shop-list-container">${item.detail}</div>
                            ${item.note && item.note !== "備註" ? `<div style="color:red; font-size:14px; margin-top:5px;">📝 ${item.note}</div>` : ''}
                        </td>
                        <td class="qty-cell">${item.sub}</td>
                    </tr>`;
            });
            area.innerHTML += html + "</table></div>";
        }
    }

    // 點擊上方搜尋結果：切換整個分組勾選
    function toggleGroupItem(name, group) {
        const key = `${name}|${group}`;
        if (selectedKeys.has(key)) {
            selectedKeys.delete(key);
            // 同步移除該分組下所有店家的隱藏狀態
            for (const sName of Object.keys(SHOP_MAP)) {
                hiddenDispatchKeys.delete(`${name}|${group}|${sName}`);
            }
        } else {
            selectedKeys.add(key);
        }
        updateSummary();
        refreshSearch();
    }

    // 點擊下方清單：僅取消單一店家的該品項
    function cancelSingleShopItem(name, group, shop) {
        const dispatchKey = `${name}|${group}|${shop}`;
        hiddenDispatchKeys.add(dispatchKey);
        
        // 檢查該品項在該分組是否還有其他店家沒被取消
        // 如果全取消了，就讓上方也變回未選取狀態
        updateSummary();
        refreshSearch();
    }

    function refreshSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            const filtered = lastFetchedData.filter(r => r[0] && r[0].replace(/"/g, '').includes(query));
            renderGroups(filtered);
        }
    }

    function updateSummary() {
        const area = document.getElementById('dispatchArea');
        const content = document.getElementById('shopContent');
        if (selectedKeys.size === 0) { area.style.display = "none"; return; }

        area.style.display = "block";
        content.innerHTML = "";

        let summary = {};
        for (const sName of Object.keys(SHOP_MAP)) summary[sName] = [];

        lastFetchedData.forEach(row => {
            const name = row[0].replace(/"/g, '');
            const ruleStr = (row[12] || "").replace(/"/g, '').trim();
            const rules = ruleStr === "" ? ["全部"] : ruleStr.split('/').map(r => r.trim());

            rules.forEach(gName => {
                if (selectedKeys.has(`${name}|${gName}`)) {
                    const isAll = gName === "全部";
                    for (const [sName, sIdx] of Object.entries(SHOP_MAP)) {
                        if (isAll || gName.split('+').some(t => sName.includes(t.trim()))) {
                            // 沒被單獨取消才顯示在下方
                            if (!hiddenDispatchKeys.has(`${name}|${gName}|${sName}`)) {
                                let v = parseInt(row[sIdx]) || 0;
                                if (v !== 0) summary[sName].push({ name, v, gName });
                            }
                        }
                    }
                }
            });
        });

        let hasAnyItem = false;
        for (const [shop, items] of Object.entries(summary)) {
            if (items.length > 0) {
                hasAnyItem = true;
                let itemsHtml = items.map(i => `
                    <div class="dispatch-row" onclick="cancelSingleShopItem('${i.name}', '${i.gName}', '${shop}')">
                        <span>${i.name} <small style="color:#999">(${i.gName})</small></span>
                        <b>${i.v}</b>
                    </div>
                `).join('');
                content.innerHTML += `<div class="shop-box"><div class="shop-box-title">📍 安星給${shop}</div>${itemsHtml}</div>`;
            }
        }
        
        if (!hasAnyItem) area.style.display = "none";
    }
</script>
</body>
</html>
